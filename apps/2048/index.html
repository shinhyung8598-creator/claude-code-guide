<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">2048</h1>
      <div class="scores">
        <div class="score-box">
          <span class="score-label">점수</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">최고</span>
          <span class="score-value" id="best">0</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <button class="btn" id="new-game">새 게임</button>
      <button class="btn btn-icon" id="theme-toggle" aria-label="다크 모드 전환">🌙</button>
    </div>

    <main>
      <div class="grid-wrapper" id="grid-wrapper" role="grid" aria-label="2048 게임 그리드">
        <div class="grid-bg">
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
          <div class="cell-bg"></div>
        </div>
        <div class="tiles" id="tiles"></div>

        <div class="overlay hidden" id="overlay-win">
          <div class="overlay-content">
            <p class="overlay-msg">🎉 2048 달성!</p>
            <button class="btn" id="continue-btn">계속하기</button>
          </div>
        </div>

        <div class="overlay hidden" id="overlay-over">
          <div class="overlay-content">
            <p class="overlay-msg">게임 오버</p>
            <button class="btn" id="retry-btn">다시하기</button>
          </div>
        </div>
      </div>
    </main>

    <p class="hint">방향키 또는 스와이프로 이동</p>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
